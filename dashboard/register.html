        main {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .card {
            border: 2px solid rgb(197, 197, 197);
            border-radius: 10px;
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.17);
            backdrop-filter: blur(100px);
            -webkit-backdrop-filter: blur(100px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1),
                inset 0 0 12px 6px rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.8),
                    transparent);
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.8),
                    transparent,
                    rgba(255, 255, 255, 0.3));
        }


        .card .card-title {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .card .card-title svg {
            color: rgba(255, 255, 255, 0.6);
            width: 40px;
            height: 40px;
        }

        .card .card-body form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 20px 20px;
        }

        .card .card-body form .input-cont {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .card .card-body form .email-input {
            grid-column: span 2;
        }

        .card .card-body form .input-cont label {
            font-size: 18px;
            font-family: var(--font-text);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 100;
        }

        .card .card-body form .input-cont option {
            background-color: rgb(42, 42, 42);
        }

        .card .card-body form .input-cont input:focus-within {
            outline-color: rgba(255, 255, 255, 0.1);
        }

        .card .card-body form .input-cont select,
        .card .card-body form .input-cont input {
            background-color: transparent;
            border: 2px solid rgba(255, 255, 255, 0.17);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 18px;
            width: 100%;
            color: rgba(255, 255, 255, 0.8)
        }

        .card .card-body form .input-cont .input-pas {
            position: relative;
        }

        .card .card-body form .input-cont .input-pas svg {
            position: absolute;
            right: 10px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            top: 50%;
            transform: translateY(-50%);
        }

        .card .card-body form .input-cont .input-pas input {
            padding-right: 40px;
        }

        .card .card-body form button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: rgb(90, 90, 220);
            grid-column: span 2;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
        }

        .card .card-body form .login {
            font-size: 18px;
            font-family: var(--font-text);
            color: rgba(255, 255, 255, 1);
            font-weight: 300;
            margin-bottom: 10px;
            grid-column: span 2;
        }

        .card .card-body form .login a {
            color: orange;
        }

        #useralert {
            opacity: 0;
            color: rgb(233, 58, 58);
            font-family: var(--font-text);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #passalert {
            opacity: 0;
            font-family: var(--font-text);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        @media screen and (max-width: 500px) {
            .card .card-body form .input-cont {
                grid-column: span 2;
            }
        }

<body>
    <main>
        <div class="card">
            <div class="card-title">
                <i data-lucide="user-round-plus"></i>
            </div>
            <div class="card-body">
                <form action="">
                    <div class="input-cont">
                        <label for="fullname">Full Name</label>
                        <input type="text" name="fullname" id="fullname">
                    </div>
                    <div class="input-cont">
                        <label for="username">Username</label>
                        <input type="text" name="username" id="username">
                        <div id="useralert">
                            <i data-lucide="circle-check"></i> This user name is taken
                        </div>
                    </div>
                    <div class="input-cont email-input">
                        <label for="email">Email Address</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div class="input-cont">
                        <label for="question">Select Question</label>
                        <select name="question" id="question">
                            <option value="">Select Question</option>
                            <option value="Date Of Birth">Date Of Birth?</option>
                            <option value="What's your mother name?">What's your mother name?</option>
                            <option value="What's your best friends name?">What's your best friends name?</option>
                            <option value="What's your favorite color?">What's your favorite color?</option>
                            <option value="What's your favorite sport?">What's your favorite sport?</option>
                        </select>
                    </div>
                    <div class="input-cont">
                        <label for="answer">Answer</label>
                        <input type="text" name="answer" id="answer">
                    </div>
                    <div class="input-cont">
                        <label for="password">Password</label>
                        <div class="input-pas">
                            <i data-lucide="eye"></i>
                            <input type="password" name="password" id="password">
                        </div>
                    </div>
                    <div class="input-cont">
                        <label for="confirm_password">Confirm Password</label>
                        <div class="input-pas">
                            <i data-lucide="eye"></i>
                            <input type="password" name="confirm_password" id="confirm_password">
                        </div>
                        <div id="passalert"></div>
                    </div>
                    <button type="button" onclick="register()">Register</button>
                    <p class="login">Already have an account <a href="login.php">Login</a></p>
                </form>
            </div>
        </div>
    </main>
    <script src="root.js"></script>
    <script>

        const username = document.getElementById("username");
        const useralert = document.getElementById("useralert");
        let usertimeout = null;
        username.addEventListener("input", () => {
            clearTimeout(usertimeout);
            if (username.value.length === 0) {
                useralert.innerHTML = `<i data-lucide="info"></i> Enter username`;
                lucide.createIcons();
                useralert.style.opacity = 1;
                useralert.style.color = "orange";
                return;
            }

            usertimeout = setTimeout(() => {
                $.ajax({
                    url: "b_check_username.php",
                    type: "Post",
                    data: { username: username.value },
                    dataType: "json",
                    success: function (response) {
                        if (response.success) {
                            useralert.innerHTML = `<i data-lucide="circle-check"></i> Username Available`;
                            useralert.style.color = "#2fc52f";
                        } else {
                            useralert.innerHTML = `<i data-lucide="circle-x"></i> This user name is taken`;
                            useralert.style.color = "#ff6161";
                        }
                        lucide.createIcons();
                        useralert.style.opacity = 1;
                    }
                });
            }, 500);
        });

        function register() {
            if ($("#password").val() !== $("#confirm_password").val()) {
                const passalert = document.getElementById("passalert");
                passalert.innerHTML = `<i data-lucide="info"></i> Password Not Matched`;
                lucide.createIcons();
                passalert.style.opacity = 1;
                passalert.style.color = "orange";
                return;
            }

            const data = {
                fullname: $("#fullname").val(),
                username: $("#username").val(),
                email: $("#email").val(),
                question: $("#question").val(),
                answer: $("#answer").val(),
                password: $("#password").val(),
            }

            $.ajax({
                url: 'register.php',
                type: "Post",
                data: data,
                dataType: "json",
                success: function (response) {
                    console.log(response);

                    if (response.success) {
                        Swal.fire({
                            title: "Registered",
                            text: response.message,
                            icon: "success",
                            showConfirmButton: false,
                            timer: 4000,
                        }).then(() => {
                            window.location = "login.php";
                        });
                    } else {
                        Swal.fire({
                            title: "Error",
                            text: response.message,
                            icon: "error",
                            confirmButtonText: "Ok"
                        });
                    }
                }
            })
        }
    </script>
</body>
